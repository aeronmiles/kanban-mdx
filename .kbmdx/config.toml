version = 15
tasks_dir = "tasks"
priorities = [
    "low",
    "medium",
    "high",
    "critical",
]
claim_timeout = "1h"
next_id = 91

[board]
name = "kanban-mdx"

[[statuses]]
name = "backlog"

[[statuses]]
name = "todo"

[[statuses]]
name = "in-progress"
require_claim = true

[[statuses]]
name = "review"
require_claim = true

[[statuses]]
name = "references"

[[statuses]]
name = "done"

[[statuses]]
name = "archived"

[defaults]
status = "backlog"
priority = "medium"
class = "standard"

[[classes]]
name = "expedite"
wip_limit = 1
bypass_column_wip = true

[[classes]]
name = "fixed-date"

[[classes]]
name = "standard"

[[classes]]
name = "intangible"

[tui]
title_lines = 2
theme = "dark"
collapsed_columns = [
    "backlog",
    "todo",
    "in-progress",
    "review",
    "done",
]
sort_mode = 1
reader_max_width = 130
reader_width_pct = 70
brightness = -0.000000007450581
saturation = -0.10000002

[[tui.age_thresholds]]
after = "0s"
color = "242"

[[tui.age_thresholds]]
after = "1h"
color = "34"

[[tui.age_thresholds]]
after = "24h"
color = "226"

[[tui.age_thresholds]]
after = "72h"
color = "208"

[[tui.age_thresholds]]
after = "168h"
color = "196"

[semantic_search]
enabled = true
provider = "voyage"
model = "voyage-4-lite"
